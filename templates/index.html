<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Forensic Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 40px; border-radius: 24px; text-align: center; width: 450px; border: 1px solid #334155; position: relative; }
        .upload-section { border: 2px dashed #334155; padding: 30px; border-radius: 12px; margin-bottom: 25px; background: #0f172a; position: relative; overflow: hidden; }
        
        /* Laser Scanner Effect */
        .laser { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #3b82f6; box-shadow: 0 0 15px #3b82f6; animation: scan 2s infinite ease-in-out; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        .verify-btn { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { display: none; margin-top: 10px; color: #3b82f6; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color:#3b82f6;">🔍 AI Forensic Lab</h1>
    <form id="f-form" action="/upload" method="post" enctype="multipart/form-data">
        <div class="upload-section">
            <div class="laser" id="laser"></div>
            <input type="file" name="file" required>
        </div>
        <button type="submit" class="verify-btn" id="btn">START SCAN</button>
        <div id="status">SCANNING DOCUMENT PIXELS...</div>
    </form>
    <a href="/" style="display:block; margin-top:20px; color:#64748b; text-decoration:none; font-size:12px;">🏠 Back to Dashboard</a>
</div>
<script>
    document.getElementById('f-form').onsubmit = function() {
        document.getElementById('laser').style.display = 'block';
        document.getElementById('status').style.display = 'block';
        document.getElementById('btn').disabled = true;
        document.getElementById('btn').innerText = "PROCESSING...";
        setTimeout(() => { this.submit(); }, 3000);
        return false;
    };
</script>
</body>
</html>
